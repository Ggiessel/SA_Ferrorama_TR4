<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-In</title>
     <link rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="logo">
        <img src="logo2TR4.png" alt="Logo TR4"> 
    </div>

    <div class="card">

        <h1>Criar uma conta</h1>
        <p>Insira seu e-mail para se cadastrar neste aplicativo</p>

        <input type="email" placeholder="Insira seu e-mail">
        <input type="email" placeholder="Insira sua senha">

        <button class="btn-primario">Continuar</button>

          <p class="termos">
            Ao clicar em continuar, você concorda com os nossos Termos de Serviço e com a Política de Privacidade 
        </p>
    </div>
    
</body>
</html>

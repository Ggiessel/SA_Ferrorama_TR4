
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/perfil-funcionario.css">
</head>

<body>
    <h1>Perfil do Funcionário</h1>
    <div class="perfil-funcionario">
        <b> Informações Pessoais </b>
        <div class="cargoatual-funcionario">
            <input type="text" placeholder="Cargo atual:funcionario">

        </div>
        <div class="nome-funcionario">
            <input type="text" placeholder="Nome do funcionario">
            <input type="text" placeholder="Ativo desde">
        </div>
        <div class="email-funcionario">
            <input type="text" placeholder="Email do funcionario">
        </div>
        <div class="telefone-funcionario">
            <input type="text" placeholder="Telefone do funcionario">
        </div>
        <div class="CPF">
            <input type="text" placeholder="CPF do funcionario">
        </div>
        <div class="data-nascimento">
            <input type="text" placeholder="Data de nascimento do funcionario">
        </div>
        <div class="endereco">
            <input type="text" placeholder="Endereço do funcionario">
        </div>
        <div class="button">
            <button onclick="descartar()">Descartar</button>
            <button onclick="salvar()">Salvar</button>
        </div>
    </div>
    </div>
</body>

</html>

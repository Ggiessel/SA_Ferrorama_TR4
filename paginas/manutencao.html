<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção</title>
    <link rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
    
<body>
<div class="tela-label"></div>
 
<div class="card">
  <div class="header">
    <div class="menu-icon">
      <div></div>
      <div></div>
      <div></div>
    </div>
    <h1><i class="bi bi-list"></i>Manutenção</h1>
  </div>

   <div class="content">
        <div class="left-col">
          <p class="first">Informe o código do trem:</p>
          <input type="text" placeholder="EX:000">
        </div>
    </div>

  <div class="field">
    <p>Informe qual era a rota:</p>
    <div class="select-wrapper">
      <select>
        <option>Rota 31</option>
      </select>
    </div>
  </div>
 
  <div class="field">
    <p>Informe qual era a carga:</p>
    <div class="select-wrapper">
      <select>
        <option>Sacos de milho</option>
      </select>
    </div>
  </div>

     <div class="content">
        <div class="left-col">
          <p class="first">Informe a causa:</p>
          <input type="text" placeholder="EX:Batida">
        </div>
    </div>

      <div class="right-col">
        <div>
          <button class="pdf-btn">Salvar como PDF</button>
          </div>
          <div>
          <button class="save-btn">Salvar</button>
        </div>
        </div>
    </div>
    </body>

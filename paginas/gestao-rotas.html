<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Rotas</title>
     <link rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <h1><i class="bi bi-list"></i> Gestão de Rotas </h1>

    <div class="rotas">
     <h2>HORÁRIOS</h2>
        <select>
        <option>Rota 14</option>
      </select>
  </div>  

  <div class="card">

    <div class="grid-horarios-leitura">
        <div class="card-horario-div">07:30</div>
        <div class="card-horario-div">15:00</div>

        <div class="card-horario-div">13:30</div>
        <div class="card-horario-div">17:00</div>

        <div class="card-horario-div">20:30</div>
        <div class="card-horario-div">00:00</div>

        <div class="card-horario-div">04:30</div>
        <div class="card-horario-div">06:00</div>
    </div>

    <div class="secao-paineis-informativos">
        
        <div class="painel-card painel-status">
            <h2>STATUS</h2>
            
            <div class="divisor-tracejado"></div>
            
            <div class="status-linhas-wrapper">
                <div class="bloco-linha">
                    <span class="label-linha">LINHA 1</span>
                    <div class="badge-status-leitura">Já partiu</div>
                </div>
                
                <div class="bloco-linha">
                    <span class="label-linha">LINHA 2</span>
                    <div class="badge-status-leitura">Em espera</div>
                </div>
            </div>
        </div>

        <div class="painel-card painel-alertas">
            <h2>ALERTAS</h2>
            
            <div class="caixa-mensagem-alerta">
                <span class="emoji-alerta">⚠️</span>
                <p>O trem da linha 306 está em manutenção devido a alguns problemas tecnicos.</p>
            </div>
        </div>

    </div>

  </div>

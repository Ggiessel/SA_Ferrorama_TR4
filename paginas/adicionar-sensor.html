<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Sensor</title>
    <link rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
    
<body>
<div class="tela-label"></div>
 
<div class="card">
  <div class="header">
    <div class="menu-icon">
      <div></div>
      <div></div>
      <div></div>
    </div>
    <h1><i class="bi bi-list"></i>Adicionar Sensor</h1>
  </div>
 
  <div class="field">
    <label>Escolha o tipo de sensor</label>
    <div class="select-wrapper">
      <select>
        <option>GEL 2747</option>
      </select>
    </div>
  </div>
 
  <div class="field">
    <label>Escolha o local do sensor</label>
    <div class="select-wrapper">
      <select>
        <option>Rota 2</option>
      </select>
    </div>
  </div>
 
  <div class="info-box">
    <span class="icon"><i class="bi bi-info-circle"></i></span>
    <p>O sensor será Adicionado em até 4 semanas</p>
  </div>
 
  <button class="btn-adicionar">Adicionar</button>
</div>
 
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log-in</title>
    <link rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="page">

    <div class="logo">
        <img src="logo2TR4.png" alt="Logo TR4">
    </div>

    <div class="card">

        <h1>Entrar em uma conta</h1>
        <p>Insira seu e-mail para se cadastrar neste aplicativo</p>

        <input type="email" placeholder="email@dominio.com">

        <button class="btn-primario">Continuar</button>

        <div class="separador">
            <span>ou</span>
        </div>

        <button class="btn-continuar">
            <i class="bi bi-google"> <p>Continuar com o Google</p></i>
        </button>

        <button class="btn-continuar">
            <i class="bi bi-apple"> <p>Continuar com a Apple</p></i>
        </button>

        <p class="termos">
            Ao clicar em continuar, você concorda com os nossos Termos de Serviço e com a Política de Privacidade 
        </p>
    </div>

    <p class="rodape">Não tem conta? Cadastre-se</p>
  </div>  
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Geral</title>
    <link rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <h1><i class="bi bi-arrow-left-short"></i> Dashboard</h1>

    <div class="mapa">
        <img src="mapaIlustrativo.jpg" alt="Mapa de rotas">
    </div>

    <div class="alertas">

    <div class="card-metrica-painel">
        <div class="legenda-grafico-wrapper">
            <div class="item-legenda">
                <span class="quadrado-cor cor-em-rota"></span>
                <span class="texto-legenda">Em rota</span>
            </div>
            <div class="item-legenda">
                <span class="quadrado-cor cor-disponivel"></span>
                <span class="texto-legenda">Disponíveis</span>
            </div>
        </div>
        
        <div class="imagem-grafico-box">
            <img src="graficoIlustrativo.png" alt="Grafico meramente Ilustrativo">
    </div>

    <div class="card-metrica-painel">
        <div class="seletor-wrapper">
            <select name="selecao-rota" id="selecao-rota">
                <option value="rota-36">Rota 36</option>
                <option value="rota-37">Rota 37</option>
                <option value="rota-38">Rota 38</option>
            </select>
        </div>

        <div class="dados-texto-wrapper">
            <p class="texto-metrica-capital">PASSAGEIROS TRANSPORTADOS - 1200</p>
            <p class="texto-metrica-capital">QUILOMETRAGEM - 5069 KM</p>
        </div>
    </div>

    <div class="card-metrica-painel">
        <div class="seletor-wrapper">
            <select name="selecao-trem" id="selecao-trem">
                <option value="trem-08">Trem 08</option>
                <option value="trem-09">Trem 09</option>
                <option value="trem-10">Trem 10</option>
            </select>
        </div>

        <div class="dados-texto-wrapper">
            <p class="texto-metrica-capital">CONSUMO DE COMBUSTÍVEL - 14km/L</p>
            <p class="texto-metrica-capital">FATURAMENTO - 1.300.000 R$</p>
        </div>
    </div>

</div>
    
</body>
</html>
